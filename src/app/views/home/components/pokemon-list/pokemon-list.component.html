@if (_pokedexVersion) {
  <div class="pokemon-list">
    @if (_busy) {
      <div class="message">Loading... Don't turn off the power</div>
    }
    @if (!_busy) {
      <div class="pokemons-container">
        @if (_pokemons.length) {
          @for (pokemon of _pokemons; track pokemon) {
            <div class="pokemon-card">
              <app-pokemon-card
                [pokemon]="pokemon"
                [pokedexVersion]="_pokedexVersion"
              ></app-pokemon-card>
            </div>
          }
        }
        @if (!_pokemons.length) {
          <img src="./assets/images/sleeping-pikachu.gif" alt="" height="54" width="54" />
        }
      </div>
    }
  </div>
}
